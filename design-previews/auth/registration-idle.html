<!-- @dsCard group="Registration" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration — Idle</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <div class="max-w-md mx-auto mt-16 px-8 py-10 bg-white rounded-lg shadow-md">

    <h1 class="text-2xl font-bold text-gray-900 mb-6">Create your account</h1>

    <form novalidate class="space-y-5">

      <!-- Email -->
      <div class="space-y-1">
        <label for="email" class="block text-sm font-medium text-gray-700">
          Email address <span class="text-red-500">*</span>
        </label>
        <input
          id="email" name="email" type="email" autocomplete="email"
          placeholder="you@example.com"
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        />
      </div>

      <!-- Password -->
      <div class="space-y-1">
        <label for="password" class="block text-sm font-medium text-gray-700">
          Password <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <input
            id="password" name="password" type="password" autocomplete="new-password"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
          <button type="button" aria-label="Show password"
            class="absolute right-0 inset-y-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Confirm password -->
      <div class="space-y-1">
        <label for="confirm" class="block text-sm font-medium text-gray-700">
          Confirm password <span class="text-red-500">*</span>
        </label>
        <div class="relative">
          <input
            id="confirm" name="confirm" type="password" autocomplete="new-password"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm pr-10 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
          <button type="button" aria-label="Show password"
            class="absolute right-0 inset-y-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit" disabled
        class="w-full bg-indigo-600 text-white font-medium py-2 px-4 rounded-md text-sm opacity-50 cursor-not-allowed mt-2">
        Create account
      </button>

    </form>

    <!-- Sign-in link -->
    <p class="text-center mt-6 text-sm text-gray-500">
      Already have an account?
      <a href="/login" class="font-medium text-indigo-600 hover:underline">Sign in</a>
    </p>

  </div>

</body>
</html>
